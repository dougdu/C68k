name: CI

# c68k CI across the supported dev hosts: Windows (MSVC), macOS (Clang), Linux
# (GCC/Clang). Each job builds c68k, runs the front-end smoke checks, and runs
# the P1 big-endian ILP32 type-model check (a pure compile-time test).
#
# From P1 the interim x86-64 back end no longer produces runnable code (pointers
# are 4 bytes), so there is no execution / self-host job yet -- real execution
# testing returns in P2 under sim68k with the 68000 back end.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux:
    name: linux build + type-model (${{ matrix.cc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang
      - name: Build c68k
        run: make CC=${{ matrix.cc }} c68k
      - name: Front-end smoke checks
        run: make CC=${{ matrix.cc }} smoke
      - name: Type-model check (ILP32-BE)
        run: make CC=${{ matrix.cc }} type-check

  macos:
    name: macOS build + type-model (clang)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build c68k
        run: make CC=clang c68k
      - name: Front-end smoke checks
        run: make CC=clang smoke
      - name: Type-model check (ILP32-BE)
        run: make CC=clang type-check

  windows:
    name: windows build + type-model (MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Configure (CMake + MSVC)
        run: cmake -S . -B build
      - name: Build c68k
        run: cmake --build build --config Release
      - name: Front-end + type-model checks
        shell: pwsh
        run: |
          $cc = "build/Release/c68k.exe"
          $s = 'int main(){return 41+1;}' | & $cc -S -o- -xc -
          if (-not ($s -match 'main:')) { throw "-S did not emit 'main:'" }
          $e = 'int x=1+2;' | & $cc -E -xc -
          if (-not ($e -match 'int x')) { throw "-E preprocessing failed" }
          $m = "#ifdef __c68k__`nint C;`n#endif" | & $cc -E -xc -
          if (-not ($m -match 'int C')) { throw "__c68k__ predefined macro missing" }
          $t = "#ifdef __osiris__`nint O;`n#endif" | & $cc -E -xc -target osiris -
          if (-not ($t -match 'int O')) { throw "-target osiris macro missing" }
          $h = (& $cc --help 2>&1) -join "`n"
          if (-not ($h -match 'c68k')) { throw "--help failed" }
          $v = (& $cc --version 2>&1) -join "`n"
          if (-not ($v -match 'c68k')) { throw "--version failed" }
          & $cc -Iinclude -S -o- tests/typemodel.c > $null
          if ($LASTEXITCODE -ne 0) { throw "type-model check failed" }
          Write-Host "front-end + type-model OK"
